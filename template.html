<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深潜科技 · 内容看板</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#21252e; --line:#2c313b;
    --txt:#e8eaed; --dim:#9aa0aa; --accent:#7c9cff; --accent2:#5b76d6;
    --hot:#ff6b6b; --ok:#ffd166; --bad:#6b7280; --good:#4ade80; --ref:#4ade80;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;padding:28px 32px 60px;line-height:1.5}
  h1{font-size:24px;font-weight:700;letter-spacing:1px}
  .sub{color:var(--dim);font-size:13px;margin-top:4px}

  /* 标签页切换 */
  .tabs{display:flex;gap:10px;margin:22px 0 6px}
  .tab{background:var(--card);border:1px solid var(--line);color:var(--dim);padding:9px 22px;border-radius:11px;font-size:15px;cursor:pointer;font-weight:600;transition:.15s}
  .tab:hover{border-color:var(--accent)}
  .tab.on{background:var(--accent);color:#0f1115;border-color:var(--accent)}
  .tab.ref.on{background:var(--ref);border-color:var(--ref)}

  .view{display:none}.view.on{display:block}

  /* 顶部统计 */
  .stats{display:flex;gap:14px;flex-wrap:wrap;margin:20px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 22px;min-width:110px}
  .stat .num{font-size:28px;font-weight:700;color:var(--accent)}
  .stat .lbl{font-size:12px;color:var(--dim);margin-top:2px}

  /* 图表 */
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:28px}
  .chart{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .chart h3{font-size:14px;margin-bottom:14px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
  .bar-row .name{width:90px;color:var(--dim);text-align:right;flex-shrink:0}
  .bar-track{flex:1;background:var(--card2);border-radius:6px;height:18px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .bar-fill.g{background:linear-gradient(90deg,#2f9e64,var(--good))}
  .bar-row .val{width:54px;color:var(--txt);font-variant-numeric:tabular-nums}

  /* 筛选 */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .filters .glabel{color:var(--dim);font-size:12px;margin-right:2px}
  .chip{background:var(--card);border:1px solid var(--line);color:var(--dim);padding:5px 13px;border-radius:20px;font-size:13px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);color:#0f1115;border-color:var(--accent);font-weight:600}

  /* 卡片网格 */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .cover{height:240px;background:#13161c;display:flex;align-items:center;justify-content:center;color:#566;font-size:12px;position:relative}
  .cover img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain}
  .card .pad{padding:14px 16px}
  .card .top{display:flex;gap:6px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
  .badge{font-size:11px;padding:2px 9px;border-radius:6px;font-weight:600}
  .b-plat{background:#2a3142;color:#a9b8ff}
  .b-type{background:#2c2638;color:#d8b4fe}
  .b-rate-爆款{background:rgba(255,107,107,.18);color:var(--hot)}
  .b-rate-普通{background:rgba(255,209,102,.16);color:var(--ok)}
  .b-rate-扑街{background:rgba(107,114,128,.25);color:#aab0bb}
  .b-rate-待定{background:#2c313b;color:var(--dim)}
  .card h2{font-size:15px;line-height:1.4;margin-bottom:8px;font-weight:600}
  .card .meta{font-size:12px;color:var(--dim);margin-bottom:10px}
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
  .tag{font-size:11px;color:var(--accent);background:rgba(124,156,255,.12);padding:2px 8px;border-radius:5px}
  .card .data{display:flex;gap:14px;font-size:12px;border-top:1px solid var(--line);padding-top:10px}
  .card .data div{display:flex;flex-direction:column}
  .card .data .dnum{font-size:15px;font-weight:700;color:var(--txt)}
  .card .data .dlbl{color:var(--dim);font-size:11px}

  /* 弹窗 */
  .mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);z-index:99;align-items:flex-start;justify-content:center;padding:50px 20px;overflow-y:auto}
  .mask.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:700px;width:100%;padding:30px 34px;position:relative}
  .modal .top{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .modal h2{font-size:20px;margin-bottom:6px}
  .modal .meta{color:var(--dim);font-size:13px;margin-bottom:16px}
  .modal .dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin-bottom:18px}
  .modal .dgrid .box{background:var(--card2);border-radius:10px;padding:12px;text-align:center}
  .modal .dgrid .box .n{font-size:20px;font-weight:700;color:var(--accent)}
  .modal .dgrid .box .l{font-size:11px;color:var(--dim);margin-top:3px}
  .modal .note{background:var(--card2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:8px;font-size:13px;color:var(--dim);margin-bottom:16px}
  .modal h4{font-size:13px;color:var(--dim);margin:18px 0 8px;font-weight:600}
  .modal .body{white-space:pre-wrap;font-size:14px;line-height:1.8;color:#d4d7dd}
  .modal .cmts{display:flex;flex-direction:column;gap:8px}
  .modal .cmt{background:var(--card2);border-radius:8px;padding:9px 13px;font-size:13px;color:#c9ccd2}
  .modal .close{position:absolute;top:18px;right:20px;background:var(--card2);border:1px solid var(--line);color:var(--txt);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:17px}
  .empty{color:var(--dim);text-align:center;padding:50px;grid-column:1/-1}
  hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0}
</style>
</head>
<body>
<h1>深潜科技 · 内容看板</h1>
<div class="sub">尚无数据 ｜ 点卡片看详情。加内容就把截图发给 Claude，说"更新看板"自动刷新</div>

<div class="tabs">
  <div class="tab on" id="t-mine" onclick="switchTab('mine')">我的内容</div>
  <div class="tab ref" id="t-ref" onclick="switchTab('ref')">对标库（要学的）</div>
</div>

<!-- ===== 我的内容 ===== -->
<div class="view on" id="v-mine">
  <div class="stats" id="stats"></div>
  <div class="charts" id="charts"></div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- ===== 对标库 ===== -->
<div class="view" id="v-ref">
  <div class="filters" id="rfilters"></div>
  <div class="grid" id="rgrid"></div>
</div>

<div class="mask" id="mask">
  <div class="modal" id="modal"><button class="close" onclick="closeModal()">×</button></div>
</div>

<script>
/* ===================== 我的内容 ===================== */
const POSTS = [
  // 每篇稿子一个对象。发帖时填入，结构见 README。
];

/* ===================== 对标库（别人的，要学/要抄） ===================== */
const REFS = [
  // 对标库：别人的、要学要抄的帖子，结构见 README。
];

/* ---------- 工具 ---------- */
function fmt(n){return n>=10000?(n/10000).toFixed(1)+"w":(n||0);}
function weekLabel(d){
  const dt=new Date(d); const day=(dt.getDay()+6)%7;
  const mon=new Date(dt); mon.setDate(dt.getDate()-day);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const f=x=>(x.getMonth()+1)+"/"+x.getDate();
  return f(mon)+"–"+f(sun);
}

/* ---------- 统计 ---------- */
function renderStats(){
  const total=POSTS.length;
  const hot=POSTS.filter(p=>p.评级==="爆款").length;
  const plats=new Set(POSTS.map(p=>p.平台)).size;
  const 互动=POSTS.reduce((s,p)=>s+(p.数据.点赞||0)+(p.数据.收藏||0),0);
  const data=[["总篇数",total],["平台数",plats],["爆款数",hot],["总互动",fmt(互动)]];
  document.getElementById("stats").innerHTML=data.map(([l,n])=>
    `<div class="stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`).join("");
}

/* ---------- 图表 ---------- */
function barChart(title,pairs,green){
  const max=Math.max(...pairs.map(p=>p[1]),1);
  const rows=pairs.map(([n,v])=>
    `<div class="bar-row"><span class="name">${n}</span>
     <div class="bar-track"><div class="bar-fill ${green?'g':''}" style="width:${v/max*100}%"></div></div>
     <span class="val">${fmt(v)}</span></div>`).join("");
  return `<div class="chart"><h3>${title}</h3>${rows}</div>`;
}
function renderCharts(){
  const byPlat={},byRate={爆款:0,普通:0,扑街:0},byWeek={};
  POSTS.forEach(p=>{
    byPlat[p.平台]=(byPlat[p.平台]||0)+1;
    if(byRate[p.评级]!=null)byRate[p.评级]++;
    const w=weekLabel(p.日期);
    byWeek[w]=(byWeek[w]||0)+(p.数据.点赞||0)+(p.数据.收藏||0);
  });
  const weeks=Object.entries(byWeek).sort((a,b)=>new Date("2026/"+a[0].split("–")[0])-new Date("2026/"+b[0].split("–")[0]));
  document.getElementById("charts").innerHTML=
    barChart("每周互动趋势（点赞+收藏）",weeks,true)+
    barChart("各平台篇数",Object.entries(byPlat))+
    barChart("评级分布",Object.entries(byRate).filter(e=>e[1]));
}

/* ---------- 筛选 ---------- */
let filter={平台:"全部",评级:"全部"};
function renderFilters(){
  const plats=["全部",...new Set(POSTS.map(p=>p.平台))];
  const rates=["全部","爆款","普通","扑街"];
  let html=`<span class="glabel">平台</span>`+plats.map(p=>`<span class="chip ${filter.平台===p?'on':''}" onclick="setF('平台','${p}')">${p}</span>`).join("");
  html+=`<span class="glabel" style="margin-left:14px">评级</span>`+rates.map(r=>`<span class="chip ${filter.评级===r?'on':''}" onclick="setF('评级','${r}')">${r}</span>`).join("");
  document.getElementById("filters").innerHTML=html;
}
function setF(k,v){filter[k]=v;renderFilters();renderGrid();}

/* ---------- 我的内容卡片 ---------- */
function coverHTML(p){
  return p.封面?`<div class="cover"><img src="${p.封面}"></div>`
                :`<div class="cover">无封面（截图发我）</div>`;
}
function renderGrid(){
  let list=POSTS.filter(p=>(filter.平台==="全部"||p.平台===filter.平台)&&(filter.评级==="全部"||p.评级===filter.评级));
  list.sort((a,b)=>b.日期.localeCompare(a.日期));
  const g=document.getElementById("grid");
  if(!list.length){g.innerHTML=`<div class="empty">没有符合条件的稿子</div>`;return;}
  g.innerHTML=list.map(p=>{
    const idx=POSTS.indexOf(p);
    return `<div class="card" onclick="openMine(${idx})">
      ${coverHTML(p)}
      <div class="pad">
        <div class="top"><span class="badge b-plat">${p.平台}</span><span class="badge b-type">${p.类型}</span><span class="badge b-rate-${p.评级}">${p.评级}</span>${p.来源==="投流"?`<span class="badge" style="background:rgba(255,209,102,.18);color:var(--ok)">投流</span>`:""}</div>
        <h2>${p.标题}</h2>
        <div class="meta">${p.产品} · ${p.日期}</div>
        <div class="tags">${(p.标签||[]).slice(0,4).map(t=>`<span class="tag">#${t}</span>`).join("")}</div>
        <div class="data">
          <div><span class="dnum">${fmt(p.数据.浏览)}</span><span class="dlbl">浏览</span></div>
          <div><span class="dnum">${fmt(p.数据.点赞)}</span><span class="dlbl">点赞</span></div>
          <div><span class="dnum">${fmt(p.数据.收藏)}</span><span class="dlbl">收藏</span></div>
          <div><span class="dnum">${fmt(p.数据.评论)}</span><span class="dlbl">评论</span></div>
        </div>
      </div></div>`;
  }).join("");
}

/* ---------- 对标库卡片 ---------- */
let rfilter="全部";
function renderRFilters(){
  const plats=["全部",...new Set(REFS.map(p=>p.平台))];
  document.getElementById("rfilters").innerHTML=`<span class="glabel">平台</span>`+
    plats.map(p=>`<span class="chip ${rfilter===p?'on':''}" onclick="setRF('${p}')">${p}</span>`).join("");
}
function setRF(v){rfilter=v;renderRFilters();renderRGrid();}
function renderRGrid(){
  let list=REFS.filter(p=>rfilter==="全部"||p.平台===rfilter).sort((a,b)=>b.日期.localeCompare(a.日期));
  const g=document.getElementById("rgrid");
  if(!list.length){g.innerHTML=`<div class="empty">对标库还是空的，把你想抄/想学的帖子截图发我</div>`;return;}
  g.innerHTML=list.map(p=>{
    const idx=REFS.indexOf(p);
    return `<div class="card" onclick="openRef(${idx})">
      ${coverHTML(p)}
      <div class="pad">
        <div class="top"><span class="badge b-plat">${p.平台}</span><span class="badge" style="background:rgba(74,222,128,.15);color:var(--ref)">${p.博主||"对标"}</span></div>
        <h2>${p.标题}</h2>
        <div class="meta">${p.日期}</div>
        <div class="tags">${(p.标签||[]).slice(0,4).map(t=>`<span class="tag">#${t}</span>`).join("")}</div>
        <div class="data" style="border-color:var(--line)"><div style="font-size:12px;color:var(--dim);line-height:1.5">💡 ${p.亮点||""}</div></div>
      </div></div>`;
  }).join("");
}

/* ---------- 单篇浏览折线 ---------- */
function lineChart(hist){
  if(!hist||!hist.length) return "";
  if(hist.length===1){
    const h=hist[0];
    return `<h4>浏览走势</h4><div class="note" style="border-color:var(--good)">目前只有发布当天 1 个数据点（${h.日期}：浏览 ${fmt(h.浏览)}）。下次把新数据发我，这里就会连成折线，看出它怎么起量。</div>`;
  }
  const W=620,H=210,L=46,R=600,T=18,B=168;
  const max=Math.max(...hist.map(h=>h.浏览),1);
  const n=hist.length;
  const X=i=>n===1?(L+R)/2:L+(R-L)*i/(n-1);
  const Y=v=>B-(B-T)*v/max;
  const pts=hist.map((h,i)=>[X(i),Y(h.浏览)]);
  const poly=pts.map(p=>p[0].toFixed(0)+","+p[1].toFixed(0)).join(" ");
  const dots=hist.map((h,i)=>{
    const[x,y]=pts[i];
    return `<circle cx="${x.toFixed(0)}" cy="${y.toFixed(0)}" r="4" fill="#7c9cff"/>
      <text x="${x.toFixed(0)}" y="${(y-10).toFixed(0)}" fill="#e8eaed" font-size="12" text-anchor="middle">${fmt(h.浏览)}</text>
      <text x="${x.toFixed(0)}" y="190" fill="#9aa0aa" font-size="11" text-anchor="middle">${h.日期.slice(5)}</text>`;
  }).join("");
  return `<h4>浏览走势（共 ${n} 个数据点）</h4>
    <div class="chart" style="padding:12px 8px 6px">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
      <line x1="${L}" y1="${B}" x2="${R}" y2="${B}" stroke="#2c313b"/>
      <line x1="${L}" y1="${T}" x2="${L}" y2="${B}" stroke="#2c313b"/>
      <text x="${L-8}" y="${T+4}" fill="#9aa0aa" font-size="10" text-anchor="end">${fmt(max)}</text>
      <polyline points="${poly}" fill="none" stroke="#7c9cff" stroke-width="2.5"/>
      ${dots}
    </svg></div>`;
}

/* ---------- 弹窗 ---------- */
function openMine(i){
  const p=POSTS[i],d=p.数据;
  const boxes=[["浏览",d.浏览],["点赞",d.点赞],["收藏",d.收藏],["评论",d.评论]]
    .map(([l,n])=>`<div class="box"><div class="n">${fmt(n)}</div><div class="l">${l}</div></div>`).join("");
  const cmts=(p.评论||[]).length?`<h4>评论区</h4><div class="cmts">${p.评论.map(c=>`<div class="cmt">${c}</div>`).join("")}</div>`:"";
  document.getElementById("modal").innerHTML=`<button class="close" onclick="closeModal()">×</button>
     <div class="top"><span class="badge b-plat">${p.平台}</span><span class="badge b-type">${p.类型}</span><span class="badge b-rate-${p.评级}">${p.评级}</span></div>
     <h2>${p.标题}</h2><div class="meta">${p.产品} · ${p.日期} · ${p.状态}</div>
     ${p.封面?`<img src="${p.封面}" style="display:block;max-width:100%;max-height:300px;width:auto;margin:0 auto 16px;border-radius:12px">`:""}
     <div class="dgrid">${boxes}</div>
     ${lineChart(p.历史)}
     <div class="tags" style="margin-bottom:16px">${(p.标签||[]).map(t=>`<span class="tag">#${t}</span>`).join("")}</div>
     ${p.备注?`<div class="note">📌 ${p.备注}</div>`:""}
     <h4>正文</h4><div class="body">${p.正文}</div>
     ${cmts}`;
  document.getElementById("mask").classList.add("show");
}
function openRef(i){
  const p=REFS[i];
  document.getElementById("modal").innerHTML=`<button class="close" onclick="closeModal()">×</button>
     <div class="top"><span class="badge b-plat">${p.平台}</span><span class="badge" style="background:rgba(74,222,128,.15);color:var(--ref)">${p.博主||"对标"}</span></div>
     <h2>${p.标题}</h2><div class="meta">${p.日期}</div>
     ${p.封面?`<img src="${p.封面}" style="display:block;max-width:100%;max-height:300px;width:auto;margin:0 auto 16px;border-radius:12px">`:""}
     <div class="tags" style="margin-bottom:16px">${(p.标签||[]).map(t=>`<span class="tag">#${t}</span>`).join("")}</div>
     <div class="note">💡 想学的点：${p.亮点||""}</div>
     <h4>正文摘录</h4><div class="body">${p.正文摘录||""}</div>
     ${p.链接?`<hr class="sep"><a href="${p.链接}" style="color:var(--accent);font-size:13px">原帖链接</a>`:""}`;
  document.getElementById("mask").classList.add("show");
}
function closeModal(){document.getElementById("mask").classList.remove("show");}
document.getElementById("mask").addEventListener("click",e=>{if(e.target.id==="mask")closeModal();});

/* ---------- 标签页 ---------- */
function switchTab(t){
  document.getElementById("t-mine").classList.toggle("on",t==="mine");
  document.getElementById("t-ref").classList.toggle("on",t==="ref");
  document.getElementById("v-mine").classList.toggle("on",t==="mine");
  document.getElementById("v-ref").classList.toggle("on",t==="ref");
}

renderStats();renderCharts();renderFilters();renderGrid();renderRFilters();renderRGrid();
</script>
</body>
</html>
